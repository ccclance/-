<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="加鹽提醒">
<title>軟水器加鹽記錄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a1628;
    --surface: #0f2040;
    --card: #162a4a;
    --accent: #4fc3f7;
    --accent2: #81d4fa;
    --warn: #ffb74d;
    --danger: #ef5350;
    --success: #66bb6a;
    --text: #e8f4fd;
    --muted: #7899b4;
    --border: #1e3a5f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 20px);
    overflow-x: hidden;
  }

  /* animated water background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 80%, rgba(79,195,247,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 20%, rgba(30,58,95,0.5) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* header */
  header {
    text-align: center;
    padding: 32px 0 8px;
  }

  .header-icon {
    font-size: 52px;
    display: block;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 16px rgba(79,195,247,0.5));
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  h1 {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  .subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
  }

  /* status card */
  .status-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: all 0.4s ease;
  }

  .status-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
    border-radius: 20px 20px 0 0;
  }

  .status-card.warn::before { background: linear-gradient(90deg, var(--warn), #ffd54f, transparent); }
  .status-card.danger::before { background: linear-gradient(90deg, var(--danger), #ff8a65, transparent); }
  .status-card.ok::before { background: linear-gradient(90deg, var(--success), #a5d6a7, transparent); }

  .status-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .status-value {
    font-size: 42px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 4px;
  }

  .status-sub {
    font-size: 13px;
    color: var(--muted);
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  .badge-ok { background: rgba(102,187,106,0.15); color: var(--success); border: 1px solid rgba(102,187,106,0.3); }
  .badge-warn { background: rgba(255,183,77,0.15); color: var(--warn); border: 1px solid rgba(255,183,77,0.3); }
  .badge-danger { background: rgba(239,83,80,0.15); color: var(--danger); border: 1px solid rgba(239,83,80,0.3); animation: pulse 2s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

  /* progress ring */
  .ring-wrap {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 4px;
  }

  .ring-container { position: relative; width: 80px; height: 80px; flex-shrink: 0; }

  .ring-svg { transform: rotate(-90deg); }

  .ring-bg { fill: none; stroke: var(--border); stroke-width: 6; }

  .ring-fill {
    fill: none;
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.4s;
    stroke-dasharray: 220;
  }

  .ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
  }

  .ring-pct { font-size: 15px; font-weight: 500; color: var(--text); }
  .ring-unit { font-size: 9px; color: var(--muted); }

  .ring-info { flex: 1; }
  .ring-info .status-value { font-size: 32px; }

  /* add button */
  .add-btn {
    width: 100%;
    padding: 18px;
    border-radius: 16px;
    border: none;
    background: linear-gradient(135deg, #1565c0, #0277bd);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 4px 24px rgba(79,195,247,0.2);
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .add-btn:active { transform: scale(0.97); box-shadow: 0 2px 12px rgba(79,195,247,0.15); }

  .add-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    pointer-events: none;
  }

  /* notification section */
  .section-title {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .notif-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .notif-info { display: flex; align-items: center; gap: 12px; }
  .notif-icon { font-size: 24px; }
  .notif-text { font-size: 14px; }
  .notif-sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }

  .toggle {
    width: 48px; height: 28px;
    background: var(--border);
    border-radius: 100px;
    position: relative;
    cursor: pointer;
    transition: background 0.3s;
    flex-shrink: 0;
    border: none;
  }

  .toggle.on { background: #1565c0; }

  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 22px; height: 22px;
    background: white;
    border-radius: 50%;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  .toggle.on::after { transform: translateX(20px); }

  /* history */
  .history-list { display: flex; flex-direction: column; gap: 10px; }

  .history-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .history-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .history-info { flex: 1; }
  .history-date { font-size: 14px; font-weight: 600; }
  .history-ago { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }

  .history-delete {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 16px; padding: 4px;
    border-radius: 6px;
    transition: color 0.2s;
  }
  .history-delete:active { color: var(--danger); }

  .empty-state {
    text-align: center;
    padding: 32px 20px;
    color: var(--muted);
    font-size: 14px;
    border: 1px dashed var(--border);
    border-radius: 16px;
  }
  .empty-state .e-icon { font-size: 36px; margin-bottom: 10px; display: block; opacity: 0.5; }

  /* toast */
  .toast {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 20px) + 20px);
    left: 50%; transform: translateX(-50%) translateY(80px);
    background: #1e3a5f;
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 12px 22px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    z-index: 100;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* modal overlay */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(5,12,28,0.85);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 28px 24px calc(env(safe-area-inset-bottom, 0px) + 28px);
    width: 100%; max-width: 420px;
    transform: translateY(40px);
    transition: transform 0.35s cubic-bezier(0.34,1.2,0.64,1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-size: 17px; font-weight: 700;
    margin-bottom: 20px; text-align: center;
  }

  .dt-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    outline: none;
    margin-bottom: 16px;
    -webkit-appearance: none;
    appearance: none;
    color-scheme: dark;
  }
  .dt-input:focus { border-color: var(--accent); }

  .modal-btns { display: flex; gap: 10px; }

  .modal-btn {
    flex: 1; padding: 15px;
    border-radius: 12px; border: none;
    font-family: 'Noto Serif TC', serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .modal-btn:active { transform: scale(0.97); }
  .modal-btn.cancel { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
  .modal-btn.confirm { background: linear-gradient(135deg, #1565c0, #0277bd); color: var(--text); }


  .ios-notice {
    background: rgba(21,101,192,0.15);
    border: 1px solid rgba(79,195,247,0.25);
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 12px;
    color: var(--accent2);
    line-height: 1.6;
    display: flex;
    gap: 10px;
  }
  .ios-notice-icon { font-size: 18px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="header-icon">🧂</span>
    <h1>軟水器加鹽記錄</h1>
    <div class="subtitle">WATER SOFTENER SALT LOG</div>
  </header>

  <!-- status card -->
  <div class="status-card" id="statusCard">
    <div class="status-label">距離上次加鹽</div>
    <div class="ring-wrap">
      <div class="ring-container">
        <svg class="ring-svg" width="80" height="80" viewBox="0 0 80 80">
          <circle class="ring-bg" cx="40" cy="40" r="35"/>
          <circle class="ring-fill" id="ringFill" cx="40" cy="40" r="35" stroke="var(--accent)" stroke-dashoffset="220"/>
        </svg>
        <div class="ring-text">
          <span class="ring-pct" id="ringPct">-</span>
          <span class="ring-unit">天/18</span>
        </div>
      </div>
      <div class="ring-info">
        <div class="status-label" id="statusLabel">尚無記錄</div>
        <div class="status-value" id="daysValue">—</div>
        <div class="status-sub" id="statusSub">請記錄第一次加鹽時間</div>
        <div id="statusBadge"></div>
      </div>
    </div>
  </div>

  <!-- add button -->
  <button class="add-btn" onclick="openModal()">
    <span>✚</span> 新增加鹽記錄
  </button>

  <!-- datetime modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalIfBg(event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">🧂 輸入加鹽時間</div>
      <input type="datetime-local" class="dt-input" id="dtInput" />
      <div class="modal-btns">
        <button class="modal-btn cancel" onclick="closeModal()">取消</button>
        <button class="modal-btn confirm" onclick="confirmAdd()">確認記錄</button>
      </div>
    </div>
  </div>

  <!-- notification -->
  <div>
    <div class="section-title">18天提醒</div>
    <div class="notif-card">
      <div class="notif-info">
        <span class="notif-icon">🔔</span>
        <div>
          <div class="notif-text">18天到期提醒</div>
          <div class="notif-sub" id="notifSubText">尚未啟用</div>
        </div>
      </div>
      <button class="toggle" id="notifToggle" onclick="toggleNotif()"></button>
    </div>
    <div class="ios-notice" style="margin-top:10px">
      <span class="ios-notice-icon">ℹ️</span>
      <span>將此頁面加入主畫面（Safari → 分享 → 加入主畫面）後，提醒功能更穩定。iOS 系統需允許通知權限。</span>
    </div>
  </div>

  <!-- history -->
  <div>
    <div class="section-title">歷史記錄</div>
    <div class="history-list" id="historyList"></div>
  </div>

  <div style="height:20px"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'salt_records_v2';
const NOTIF_KEY = 'salt_notif_enabled';
const REMINDER_DAYS = 18;

let records = [];
let notifEnabled = false;

function load() {
  try { records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { records = []; }
  notifEnabled = localStorage.getItem(NOTIF_KEY) === '1';
  document.getElementById('notifToggle').classList.toggle('on', notifEnabled);
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  localStorage.setItem(NOTIF_KEY, notifEnabled ? '1' : '0');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  if (d === 0 && h === 0) return '剛剛';
  if (d === 0) return `${h} 小時前`;
  return `${d} 天 ${h} 小時前`;
}

function formatDate(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}  ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function updateStatus() {
  if (records.length === 0) {
    document.getElementById('statusCard').className = 'status-card';
    document.getElementById('statusLabel').textContent = '尚無記錄';
    document.getElementById('daysValue').textContent = '—';
    document.getElementById('statusSub').textContent = '請記錄第一次加鹽時間';
    document.getElementById('statusBadge').innerHTML = '';
    document.getElementById('ringPct').textContent = '-';
    document.getElementById('ringFill').style.strokeDashoffset = '220';
    document.getElementById('notifSubText').textContent = '尚未啟用';
    return;
  }

  const last = records[records.length - 1];
  const daysElapsed = (Date.now() - last) / 86400000;
  const daysLeft = REMINDER_DAYS - daysElapsed;
  const pct = Math.min(daysElapsed / REMINDER_DAYS, 1);
  const daysInt = Math.floor(daysElapsed);

  // ring: strokeDashoffset goes from 220 (empty) to 0 (full)
  const offset = Math.round((1 - pct) * 220);
  const ringFill = document.getElementById('ringFill');
  ringFill.style.strokeDashoffset = offset;

  let color, cardClass, badgeHTML;
  if (pct < 0.6) {
    color = 'var(--accent)'; cardClass = 'ok';
    badgeHTML = `<div class="status-badge badge-ok"><span class="dot"></span>狀態良好</div>`;
  } else if (pct < 1) {
    color = 'var(--warn)'; cardClass = 'warn';
    badgeHTML = `<div class="status-badge badge-warn"><span class="dot"></span>即將到期</div>`;
  } else {
    color = 'var(--danger)'; cardClass = 'danger';
    badgeHTML = `<div class="status-badge badge-danger"><span class="dot"></span>需要加鹽！</div>`;
  }

  ringFill.style.stroke = color;
  document.getElementById('statusCard').className = `status-card ${cardClass}`;
  document.getElementById('statusLabel').textContent = '已過天數';
  document.getElementById('daysValue').textContent = `${daysInt}天`;
  document.getElementById('statusSub').textContent = daysLeft > 0
    ? `還有 ${Math.ceil(daysLeft)} 天需要加鹽`
    : `已超過提醒日期 ${Math.abs(Math.floor(daysLeft))} 天`;
  document.getElementById('statusBadge').innerHTML = badgeHTML;
  document.getElementById('ringPct').textContent = daysInt;

  const nextDate = formatDate(last + REMINDER_DAYS * 86400000);
  document.getElementById('notifSubText').textContent =
    notifEnabled ? `到期日：${nextDate}` : '已關閉';
}

function updateHistory() {
  const list = document.getElementById('historyList');
  if (records.length === 0) {
    list.innerHTML = `<div class="empty-state"><span class="e-icon">📋</span>尚無記錄<br>點擊上方按鈕記錄第一次加鹽</div>`;
    return;
  }
  list.innerHTML = [...records].reverse().map((ts, i) => `
    <div class="history-item">
      <div class="history-num">${records.length - i}</div>
      <div class="history-info">
        <div class="history-date">${formatDate(ts)}</div>
        <div class="history-ago">${timeAgo(ts)}</div>
      </div>
      <button class="history-delete" onclick="deleteRecord(${records.length - 1 - i})" title="刪除">✕</button>
    </div>
  `).join('');
}

function openModal() {
  // Default to current local datetime
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const local = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
  document.getElementById('dtInput').value = local;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function closeModalIfBg(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function confirmAdd() {
  const val = document.getElementById('dtInput').value;
  if (!val) { showToast('⚠️ 請選擇日期時間'); return; }
  const ts = new Date(val).getTime();
  if (isNaN(ts)) { showToast('⚠️ 日期格式錯誤'); return; }
  if (ts > Date.now() + 60000) { showToast('⚠️ 不能填入未來的時間'); return; }
  records.push(ts);
  records.sort((a, b) => a - b);
  save();
  closeModal();
  updateStatus();
  updateHistory();
  showToast('✓ 已記錄加鹽時間');
  scheduleNotification();
}

function addRecord() {
  openModal();
}

function deleteRecord(idx) {
  if (!confirm('確定刪除此記錄？')) return;
  records.splice(idx, 1);
  save();
  updateStatus();
  updateHistory();
  showToast('已刪除記錄');
}

// ── Notification ──────────────────────────────────────────

async function requestNotifPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  const perm = await Notification.requestPermission();
  return perm === 'granted';
}

function scheduleNotification() {
  if (!notifEnabled || records.length === 0) return;
  if (!('Notification' in window)) return;

  // Cancel old scheduled checks
  clearTimeout(window._saltTimer);

  const last = records[records.length - 1];
  const fireAt = last + REMINDER_DAYS * 86400000;
  const delay = fireAt - Date.now();

  if (delay <= 0) {
    // Already overdue — fire immediately
    if (Notification.permission === 'granted') {
      new Notification('💧 軟水器需要加鹽！', {
        body: `已超過 18 天，請盡快補充鹽分。`,
        icon: '🧂'
      });
    }
    return;
  }

  // Schedule (works only while page is open; for true background, use Service Worker)
  window._saltTimer = setTimeout(() => {
    if (Notification.permission === 'granted') {
      new Notification('💧 軟水器需要加鹽！', {
        body: '距離上次加鹽已滿 18 天，請記得補充鹽分。',
        icon: '🧂'
      });
    }
  }, Math.min(delay, 2147483647)); // max timeout
}

async function toggleNotif() {
  if (!notifEnabled) {
    const granted = await requestNotifPermission();
    if (!granted) {
      showToast('⚠️ 請在系統設定中允許通知');
      return;
    }
    notifEnabled = true;
    document.getElementById('notifToggle').classList.add('on');
    scheduleNotification();
    showToast('🔔 通知已開啟');
  } else {
    notifEnabled = false;
    document.getElementById('notifToggle').classList.remove('on');
    clearTimeout(window._saltTimer);
    showToast('通知已關閉');
  }
  save();
  updateStatus();
}

// ── Service Worker for background notifications ────────────
function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  const swCode = `
self.addEventListener('message', e => {
  if (e.data && e.data.type === 'SCHEDULE_NOTIF') {
    const { delay } = e.data;
    setTimeout(() => {
      self.registration.showNotification('💧 軟水器需要加鹽！', {
        body: '距離上次加鹽已滿 18 天，請記得補充鹽分。',
        icon: '/favicon.ico',
        badge: '/favicon.ico',
        tag: 'salt-reminder',
        requireInteraction: true
      });
    }, delay);
  }
});
`;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).then(reg => {
    window._swReg = reg;
    if (notifEnabled && records.length > 0) {
      const last = records[records.length - 1];
      const delay = (last + REMINDER_DAYS * 86400000) - Date.now();
      if (delay > 0 && reg.active) {
        reg.active.postMessage({ type: 'SCHEDULE_NOTIF', delay });
      }
    }
  }).catch(() => {});
}

// ── Init ──────────────────────────────────────────────────
load();
updateStatus();
updateHistory();
scheduleNotification();
registerSW();

// Update relative times every minute
setInterval(() => { updateStatus(); updateHistory(); }, 60000);
</script>
